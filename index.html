<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tactical Ops Wall</title>
<style>
    body {
        margin: 0;
        background: #0a0a0f;
        font-family: Arial, sans-serif;
        color: #e0e0e0;
    }

    /* Tactical Glow */
    .glow {
        border: 2px solid #0ff;
        box-shadow: 0 0 12px #0ff;
        border-radius: 8px;
    }

    /* Layout Grid */
    .container {
        display: grid;
        grid-template-rows: 45vh 25vh 25vh;
        gap: 15px;
        padding: 15px;
    }

    /* Top Radar Panel */
    .top-panel {
        grid-row: 1;
        background: #11141a;
    }

    /* Middle Row: 3 Tiles */
    .middle-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
    }

    /* Bottom Row: 3 Tiles */
    .bottom-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
    }

    .tile {
        background: #11141a;
        padding: 10px;
    }

    /* Optional Title Styling */
    .tile-title {
        font-size: 1.1rem;
        margin-bottom: 8px;
        color: #0ff;
        text-shadow: 0 0 6px #0ff;
    }
</style>
</head>

<body>

<div class="container">

    <!-- TOP RADAR PANEL -->
    <div class="top-panel glow">
        <!-- Radar goes here -->
    </div>

    <!-- MIDDLE FIRE WEATHER TILES -->
    <div class="middle-row">
        <div class="tile glow">
            <div class="tile-title">Fuel Load</div>
        </div>
        <div class="tile glow">
            <div class="tile-title">Fuel Moisture</div>
        </div>
        <div class="tile glow">
            <div class="tile-title">Fire Behavior</div>
        </div>
    </div>

    <!-- BOTTOM TILES -->
    <div class="bottom-row">
        <div class="tile glow">
            <div class="tile-title">Tile A</div>
        </div>
        <div class="tile glow">
            <div class="tile-title">Tile B</div>
        </div>
        <div class="tile glow">
            <div class="tile-title">Tile C</div>
        </div>
    </div>

</div>

</body>
</html>
