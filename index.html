<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hybrid Ops Wall</title>

<style>

/* GLOBAL RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY THEMES */
body {
    font-family: "Segoe UI", sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    color: #e8f0ff;
}

/* NIGHT OPS */
body.night-ops {
    background: #050505;
}

/* DAY OPS */
body.day-ops {
    background: #dfe6ef;
    color: #111;
}

/* THEME TOGGLE BUTTON */
#theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 8px 16px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    cursor: pointer;
    z-index: 999;
    font-size: 14px;
    letter-spacing: 1px;
    backdrop-filter: blur(6px);
}

/* BACKGROUND GRID */
.background-grid {
    position: fixed;
    inset: 0;
    background-image: 
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
}

/* HYBRID OPS VIGNETTE */
.background-vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at top left, rgba(0,150,255,0.15), transparent 60%),
                radial-gradient(circle at bottom right, rgba(255,80,0,0.15), transparent 60%);
    pointer-events: none;
    z-index: 0;
}

/* DASHBOARD GRID */
.dashboard {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding: 40px;
    height: 100%;
}

/* TILE ROWS */
.tile-row {
    display: flex;
    gap: 20px;
}

/* TILE BASE */
.tile {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    border-radius: 10px;
    overflow: hidden;
    position: relative;
}

/* TILE SIZES */
.tile-big { height: 45vh; width: 100%; }
.tile-medium { height: 25vh; flex: 1; }
.tile-small { height: 20vh; flex: 1; }

/* TILE HEADERS — THIN TACTICAL BARS */
.tile-header {
    padding: 6px 12px;
    font-size: 14px;
    letter-spacing: 1px;
    background: rgba(255,255,255,0.08);
    border-bottom: 1px solid rgba(255,255,255,0.15);
}

/* CATEGORY COLORS */
.tile-header.storm { border-left: 4px solid #00aaff; }
.tile-header.fire { border-left: 4px solid #ff5500; }
.tile-header.info { border-left: 4px solid #cccccc; }

/* IFRAMES */
iframe {
    width: 100%;
    height: calc(100% - 30px);
    border: none;
}

/* TEXT TILES */
.tile-text {
    padding: 12px;
    font-size: 14px;
    line-height: 1.4;
}

</style>
</head>

<body class="night-ops">

<!-- THEME TOGGLE -->
<div id="theme-toggle" onclick="toggleTheme()">DAY / NIGHT OPS</div>

<!-- BACKGROUND GRID + GLOW -->
<div class="background-grid"></div>
<div class="background-vignette"></div>

<!-- MAIN CONTAINER -->
<div class="dashboard">

    <!-- TOP ROW — BIG TILE -->
    <div class="tile tile-big">
        <div class="tile-header storm">Storm Intelligence</div>
        <iframe 
            src="https://www.rainviewer.com/map.html?loc=37.93,-90.79,5&oFa=1&oC=1&oF=1&oAP=1&oL=1&layer=radar&sat=1&lightning=1&alerts=1">
        </iframe>
    </div>

    <!-- MIDDLE ROW — FIRE OPS -->
    <div class="tile-row">

        <div class="tile tile-medium">
            <div class="tile-header fire">Fire Spread Potential</div>
            <iframe 
                src="https://embed.windy.com/embed2.html?lat=37.93&lon=-90.79&zoom=5&overlay=fire">
            </iframe>
        </div>

        <div class="tile tile-medium">
            <div class="tile-header fire">Fuel Moisture / Drought</div>
            <iframe 
                src="https://embed.windy.com/embed2.html?lat=37.93&lon=-90.79&zoom=5&overlay=drought">
            </iframe>
        </div>

        <div class="tile tile-medium">
            <div class="tile-header fire">Smoke / HRRR</div>
            <iframe 
                src="https://embed.windy.com/embed2.html?lat=37.93&lon=-90.79&zoom=5&overlay=smoke&product=hrrr">
            </iframe>
        </div>

    </div>

    <!-- BOTTOM ROW — TEXT INTEL -->
    <div class="tile-row">

        <div class="tile tile-small">
            <div class="tile-header info">Today’s Ops Snapshot</div>
            <div class="tile-text">
                <p>Operational summary goes here.</p>
            </div>
        </div>

        <div class="tile tile-small">
            <div class="tile-header info">Fire Weather</div>
            <div class="tile-text">
                <p>Fire weather details go here.</p>
            </div>
        </div>

        <div class="tile tile-small">
            <div class="tile-header info">Solar Power Window</div>
            <div class="tile-text">
                <p>Solar power forecast goes here.</p>
            </div>
        </div>

    </div>

</div>

<script>
function toggleTheme() {
    document.body.classList.toggle("night-ops");
    document.body.classList.toggle("day-ops");
}
</script>

</body>
</html>
