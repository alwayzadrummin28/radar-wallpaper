<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tactical Ops Wall</title>
<style>
    body {
        background-color: #000;
        color: #0ff;
        font-family: 'Segoe UI', sans-serif;
        margin: 0;
        padding: 0;
    }
    .dashboard {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        padding: 10px;
    }
    .top-radar {
        width: 95%;
        height: 300px;
        border: 2px solid #0ff;
        border-radius: 10px;
        overflow: hidden;
    }
    .middle-row, .bottom-row {
        display: flex;
        justify-content: center;
        gap: 10px;
        width: 95%;
    }
    .tile {
        flex: 1;
        height: 250px;
        border: 2px solid #0ff;
        border-radius: 10px;
        overflow: hidden;
        background-color: #001a1a;
    }
    .tile-title {
        text-align: center;
        font-weight: bold;
        padding: 5px;
        background-color: #003333;
        color: #0ff;
    }
</style>
</head>
<body>
<div class="dashboard">

    <!-- 🌧️ Top Radar Strip (RainViewer stays as-is) -->
    <div class="top-radar">
        <iframe 
            width="100%" 
            height="100%" 
            style="border:0;"
            src="https://embed.windy.com/embed2.html?
                lat=37.8
                &lon=-92.5
                &zoom=5
                &level=surface
                &overlay=radar
                &menu=false
                &message=true
                &marker=false
                &calendar=now
                &pressure=false
                &type=map
                &location=coordinates
                &detail=false
                &detailLat=37.8
                &detailLon=-92.5
                &metricWind=mph
                &metricTemp=F">
        </iframe>
    </div>

    <!-- 🔥 Middle Row -->
    <div class="middle-row">
        <!-- Middle Left: Radar (replaces old Fuel Load) -->
        <div class="tile glow">
            <div class="tile-title">Radar</div>
            <iframe 
                width="100%" 
                height="100%" 
                style="border:0;"
                src="https://embed.windy.com/embed2.html?
                    lat=37.8
                    &lon=-92.5
                    &zoom=5
                    &level=surface
                    &overlay=radar
                    &menu=false
                    &message=true
                    &marker=false
                    &calendar=now
                    &pressure=false
                    &type=map
                    &location=coordinates
                    &detail=false
                    &detailLat=37.8
                    &detailLon=-92.5
                    &metricWind=mph
                    &metricTemp=F">
            </iframe>
        </div>

        <!-- Middle Center -->
        <div class="tile glow">
            <div class="tile-title">Tile B</div>
        </div>

        <!-- Middle Right -->
        <div class="tile glow">
            <div class="tile-title">Tile C</div>
        </div>
    </div>

    <!-- 🔥 Bottom Row -->
    <div class="bottom-row">
        <!-- Fuel Load moved here -->
        <div class="tile glow">
            <div class="tile-title">Fuel Load</div>
            <iframe 
                width="100%" 
                height="100%" 
                style="border:0;"
                src="https://embed.windy.com/embed2.html?
                    lat=37.8
                    &lon=-92.5
                    &zoom=5
                    &level=surface
                    &overlay=fw-fuel
                    &menu=false
                    &message=true
                    &marker=false
                    &calendar=now
                    &pressure=false
                    &type=map
                    &location=coordinates
                    &detail=false
                    &detailLat=37.8
                    &detailLon=-92.5
                    &metricWind=mph
                    &metricTemp=F">
            </iframe>
        </div>

        <!-- Fuel Moisture -->
        <div class="tile glow">
            <div class="tile-title">Fuel Moisture</div>
            <iframe 
                width="100%" 
                height="100%" 
                style="border:0;"
                src="https://embed.windy.com/embed2.html?
                    lat=37.8
                    &lon=-92.5
                    &zoom=5
                    &level=surface
                    &overlay=fw-moisture
                    &menu=false
                    &message=true
                    &marker=false
                    &calendar=now
                    &pressure=false
                    &type=map
                    &location=coordinates
                    &detail=false
                    &detailLat=37.8
                    &detailLon=-92.5
                    &metricWind=mph
                    &metricTemp=F">
            </iframe>
        </div>

        <!-- Fire Behavior -->
        <div class="tile glow">
            <div class="tile-title">Fire Behavior</div>
            <iframe 
                width="100%" 
                height="100%" 
                style="border:0;"
                src="https://embed.windy.com/embed2.html?
                    lat=37.8
                    &lon=-92.5
                    &zoom=5
                    &level=surface
                    &overlay=fw-behavior
                    &menu=false
                    &message=true
                    &marker=false
                    &calendar=now
                    &pressure=false
                    &type=map
                    &location=coordinates
                    &detail=false
                    &detailLat=37.8
                    &detailLon=-92.5
                    &metricWind=mph
                    &metricTemp=F">
            </iframe>
        </div>
    </div>

</div>
</body>
</html>
