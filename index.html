<script>
  const apiKey = "26f495889749a69143419843a5c6a3d0";
  const fireWeatherUrl = `https://api.openweathermap.org/data/2.5/weather?q=Potosi,MO,US&units=imperial&appid=${apiKey}`;
  const solarUrl = `https://api.openweathermap.org/data/2.5/onecall?lat=37.936&lon=-90.781&units=imperial&appid=${apiKey}`;

  function formatTime() {
    const now = new Date();
    return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function updateFireWeather() {
    fetch(fireWeatherUrl)
      .then(response => response.json())
      .then(data => {
        const temp = data.main.temp;
        const wind = data.wind.speed;
        const humidity = data.main.humidity;
        document.getElementById("fireWeatherBox").innerHTML = `
          <h2>Fire Weather</h2>
          <p>Temp: ${temp}°F</p>
          <p>Wind: ${wind} mph</p>
          <p>Humidity: ${humidity}%</p>
          <p style="font-size: 0.8em; color: #45a29e;">Last updated: ${formatTime()}</p>
        `;
      })
      .catch(() => {
        document.getElementById("fireWeatherBox").innerHTML = `
          <h2>Fire Weather</h2>
          <p>Data unavailable</p>
          <p style="font-size: 0.8em; color: #45a29e;">Last updated: ${formatTime()}</p>
        `;
      });
  }

  function updateSolarWindow() {
    fetch(solarUrl)
      .then(response => response.json())
      .then(data => {
        const sunrise = new Date(data.current.sunrise * 1000).toLocaleTimeString();
        const sunset = new Date(data.current.sunset * 1000).toLocaleTimeString();
        const uv = data.current.uvi;
        document.getElementById("solarBox").innerHTML = `
          <h2>Solar Power Window</h2>
          <p>Sunrise: ${sunrise}</p>
          <p>Sunset: ${sunset}</p>
          <p>UV Index: ${uv}</p>
          <p style="font-size: 0.8em; color: #45a29e;">Last updated: ${formatTime()}</p>
        `;
      })
      .catch(() => {
        document.getElementById("solarBox").innerHTML = `
          <h2>Solar Power Window</h2>
          <p>Data unavailable</p>
          <p style="font-size: 0.8em; color: #45a29e;">Last updated: ${formatTime()}</p>
        `;
      });
  }

  // Initial load
  updateFireWeather();
  updateSolarWindow();

  // Refresh every 1 hour (3600000 milliseconds)
  setInterval(() => {
    updateFireWeather();
    updateSolarWindow();
  }, 3600000);
</script>
