<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hybrid Ops Command Wall</title>
<style>
  body {
    margin: 0;
    background-color: #0b0c10;
    color: #c5c6c7;
    font-family: "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  .top {
    flex: 2;
    display: flex;
    justify-content: center;
    align-items: stretch;
  }
  .bottom {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 10px;
  }
  .bottom > div {
    display: flex;
    flex-direction: column;
    background-color: #1f2833;
    border-radius: 8px;
    overflow: hidden;
  }
  h2 {
    margin: 6px 0;
    text-align: center;
    color: #45a29e;
    font-size: 1.1em;
  }
  iframe {
    flex: 1;
    width: 100%;
    border: none;
  }
</style>
</head>
<body>
  <div class="top">
    <iframe src="https://www.rainviewer.com/map.html?loc=37.936,-90.781,7&th=0&sm=1&sn=1&hu=0" title="Radar"></iframe>
  </div>

  <div class="bottom">
    <div>
      <h2>🔥 Fire Weather</h2>
      <iframe src="https://www.weatherwidget.io/w/" title="Fire Weather"></iframe>
    </div>
    <div>
      <h2>☀️ Solar Power Window</h2>
      <iframe src="https://www.suncalc.org/#/37.936,-90.781,10" title="SunCalc"></iframe>
    </div>
    <div>
      <h2>🧭 Ops Snapshot</h2>
      <iframe src="https://www.weather.gov/alerts" title="Weather Alerts"></iframe>
    </div>
  </div>
</body>
</html>
