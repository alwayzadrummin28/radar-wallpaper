<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hybrid Ops Command Wall</title>
<meta charset="UTF-8">
<title>Tactical Ops Wall</title>
<style>
  body {
    margin: 0;
    background-color: #0b0c10;
    color: #c5c6c7;
    font-family: "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  .top {
    flex: 2;
    display: flex;
    justify-content: center;
    align-items: stretch;
  }
  .bottom {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 10px;
  }
  .bottom > div {
    display: flex;
    flex-direction: column;
    background-color: #1f2833;
    border-radius: 8px;
    overflow: hidden;
  }
  h2 {
    margin: 6px 0;
    text-align: center;
    color: #45a29e;
    font-size: 1.1em;
  }
  iframe {
    flex: 1;
    width: 100%;
    border: none;
  }
    body {
        margin: 0;
        background: #0a0a0f;
        font-family: Arial, sans-serif;
        color: #e0e0e0;
    }

    /* Tactical Glow */
    .glow {
        border: 2px solid #0ff;
        box-shadow: 0 0 12px #0ff;
        border-radius: 8px;
    }

    /* Layout Grid */
    .container {
        display: grid;
        grid-template-rows: 45vh 25vh 25vh;
        gap: 15px;
        padding: 15px;
    }

    /* Top Radar Panel */
    .top-panel {
        grid-row: 1;
        background: #11141a;
    }

    /* Middle Row: 3 Tiles */
    .middle-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
    }

    /* Bottom Row: 3 Tiles */
    .bottom-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
    }

    .tile {
        background: #11141a;
        padding: 10px;
    }

    /* Optional Title Styling */
    .tile-title {
        font-size: 1.1rem;
        margin-bottom: 8px;
        color: #0ff;
        text-shadow: 0 0 6px #0ff;
    }
</style>
</head>

<body>
  <div class="top">
    <iframe src="https://www.rainviewer.com/map.html?loc=37.936,-90.781,7&th=0&sm=1&sn=1&hu=0" title="Radar"></iframe>
  </div>

  <div class="bottom">
    <div>
      <h2>🔥 Fire Weather</h2>
      <iframe src="https://www.weatherwidget.io/w/" title="Fire Weather"></iframe>
<div class="container">

    <!-- TOP RADAR PANEL -->
    <div class="top-panel glow">
        <!-- Radar goes here -->
    </div>
    <div>
      <h2>☀️ Solar Power Window</h2>
      <iframe src="https://www.suncalc.org/#/37.936,-90.781,10" title="SunCalc"></iframe>

    <!-- MIDDLE FIRE WEATHER TILES -->
    <div class="middle-row">
        <div class="tile glow">
            <div class="tile-title">Fuel Load</div>
        </div>
        <div class="tile glow">
            <div class="tile-title">Fuel Moisture</div>
        </div>
        <div class="tile glow">
            <div class="tile-title">Fire Behavior</div>
        </div>
    </div>
    <div>
      <h2>🧭 Ops Snapshot</h2>
      <iframe src="https://www.weather.gov/alerts" title="Weather Alerts"></iframe>

    <!-- BOTTOM TILES -->
    <div class="bottom-row">
        <div class="tile glow">
            <div class="tile-title">Tile A</div>
        </div>
        <div class="tile glow">
            <div class="tile-title">Tile B</div>
        </div>
        <div class="tile glow">
            <div class="tile-title">Tile C</div>
        </div>
    </div>
  </div>

</div>

</body>
</html>
